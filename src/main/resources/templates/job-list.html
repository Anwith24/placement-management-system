<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Job List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Available Jobs</h2>

    <form action="/jobs" method="get" class="row mb-4">

        <div class="col-md-8">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search by Job Title..."
                   th:value="${keyword}">
        </div>

        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">
                Search
            </button>
        </div>

        <div class="col-md-2">
            <a href="/jobs" class="btn btn-secondary w-100">
                Clear
            </a>
        </div>

    </form>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Job Title</th>
            <th>Company</th>
            <th>Location</th>
            <th>Salary</th>
            <th>Description</th>
            <th>Action</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="job : ${jobs}">

            <td th:text="${job.id}"></td>
            <td th:text="${job.jobTitle}"></td>
            <td th:text="${job.companyName}"></td>
            <td th:text="${job.location}"></td>
            <td th:text="${job.salary}"></td>
            <td th:text="${job.description}"></td>
            <td>

                <a th:href="@{/job/edit/{id}(id=${job.id})}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{/job/delete/{id}(id=${job.id})}"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>

                <a th:href="@{/apply/{id}(id=${job.id})}"
                   class="btn btn-success btn-sm">
                    Apply
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
