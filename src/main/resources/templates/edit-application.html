<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Application Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Update Application Status</h2>

        <form action="/application/update" method="post">

            <input type="hidden" name="id" th:value="${app.id}">

            <input type="hidden" name="studentName" th:value="${app.studentName}">
            <input type="hidden" name="studentEmail" th:value="${app.studentEmail}">
            <input type="hidden" name="jobTitle" th:value="${app.jobTitle}">
            <input type="hidden" name="companyName" th:value="${app.companyName}">

            <div class="mb-3">
                <label class="form-label">Application Status</label>

                <select class="form-select" name="status">

                    <option value="Applied"
                            th:selected="${app.status == 'Applied'}">
                        Applied
                    </option>

                    <option value="Shortlisted"
                            th:selected="${app.status == 'Shortlisted'}">
                        Shortlisted
                    </option>

                    <option value="Rejected"
                            th:selected="${app.status == 'Rejected'}">
                        Rejected
                    </option>

                    <option value="Selected"
                            th:selected="${app.status == 'Selected'}">
                        Selected
                    </option>

                </select>
            </div>

            <button type="submit" class="btn btn-primary">
                Update Status
            </button>

        </form>

    </div>

</div>

</body>
</html>
