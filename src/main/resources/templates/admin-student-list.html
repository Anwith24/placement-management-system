<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Manage Students</title>
    <style>
        table{
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }

        th,td{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }

        h1{
            text-align:center;
        }

        th{
            background-color:#e6e6e6;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">Placement Management</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/admin/dashboard">Dashboard</a>
            <a class="nav-link" href="/admin/students">Manage Students</a>

        </div>

    </div>
</nav>
<div class="container mt-5">

    <h2 class="text-center mb-4">Manage Students</h2>

    <table class="table table-bordered table-striped table-hover">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>USN</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Department</th>
            <th>CGPA</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="student : ${students}">
            <td th:text="${student.id}"></td>
            <td th:text="${student.name}"></td>
            <td th:text="${student.usn}"></td>
            <td th:text="${student.email}"></td>
            <td th:text="${student.phone}"></td>
            <td th:text="${student.department}"></td>
            <td th:text="${student.cgpa}"></td>

            <td>
                <a th:href="@{/admin/student/delete/{id}(id=${student.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this student?');">
                    Delete
                </a>
            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
