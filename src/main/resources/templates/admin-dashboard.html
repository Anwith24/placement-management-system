<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center text-primary mb-5">
        Placement Management System
    </h2>

    <h4 class="text-center mb-4">
        Welcome Admin 👋
    </h4>

    <div class="row">

        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>👨‍🎓 Students</h5>
                    <h2 th:text="${studentCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>🏢 Recruiters</h5>
                    <h2 th:text="${recruiterCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>💼 Jobs</h5>
                    <h2 th:text="${jobCount}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>📄 Applications</h5>
                    <h2 th:text="${applicationCount}"></h2>
                </div>
            </div>
        </div>

    </div>

    <hr class="my-5">

    <div class="d-grid gap-3">

        <a href="/admin/students" class="btn btn-primary btn-lg">
            Manage Students
        </a>

        <a href="/admin/recruiters" class="btn btn-secondary btn-lg">
            Manage Recruiters
        </a>

        <a href="/jobs" class="btn btn-success btn-lg">
            Manage Jobs
        </a>

        <a href="/applications" class="btn btn-warning btn-lg">
            Manage Applications
        </a>

        <a href="/admin/logout" class="btn btn-danger btn-lg">
            Logout
        </a>

    </div>

</div>

</body>
</html>
