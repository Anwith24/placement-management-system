<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Recruiters</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Manage Recruiters</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Company</th>
            <th>Recruiter Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="recruiter : ${recruiters}">

            <td th:text="${recruiter.id}"></td>
            <td th:text="${recruiter.companyName}"></td>
            <td th:text="${recruiter.recruiterName}"></td>
            <td th:text="${recruiter.email}"></td>
            <td th:text="${recruiter.phone}"></td>

            <td>
                <a th:href="@{/admin/recruiter/delete/{id}(id=${recruiter.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this recruiter?');">
                    Delete
                </a>
            </td>

        </tr>

        </tbody>

    </table>

    <div class="text-center mt-3">
        <a href="/admin/dashboard" class="btn btn-secondary">
            Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
