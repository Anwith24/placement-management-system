<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Applications</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Job Applications</h2>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Student Name</th>
            <th>Student Email</th>
            <th>Job Title</th>
            <th>Company</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="app : ${applications}">

            <td th:text="${app.id}"></td>
            <td th:text="${app.studentName}"></td>
            <td th:text="${app.studentEmail}"></td>
            <td th:text="${app.jobTitle}"></td>
            <td th:text="${app.companyName}"></td>
            <td th:text="${app.status}"></td>
            <td>
                <a th:href="@{/application/edit/{id}(id=${app.id})}"
                   class="btn btn-warning btn-sm">
                    Update Status
                </a>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
