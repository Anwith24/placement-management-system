<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recruiter Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4 text-center">

        <h4 class="text-center mb-4">
            Welcome, <span th:text="${session.recruiterName}"></span> 👋
        </h4>

        <p class="mt-3">
            Login Successful
        </p>

        <div class="d-grid gap-3">

            <a href="/job/register" class="btn btn-primary btn-lg">
                Add Job
            </a>

            <a href="/jobs" class="btn btn-success btn-lg">
                View Jobs
            </a>

            <a href="/applications" class="btn btn-warning btn-lg">
                View Applications
            </a>

            <a href="/recruiter/logout" class="btn btn-danger btn-lg">
                Logout
            </a>

        </div>
    </div>


</div>

</body>
</html>
