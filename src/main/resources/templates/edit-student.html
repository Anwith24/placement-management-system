<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student</title>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">Placement Management</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/register">Register Student</a>
            <a class="nav-link" href="/students">View Students</a>
        </div>

    </div>
</nav>
<h1>Edit Student</h1>

<form action="/updateStudent" method="post">

    <input type="hidden" name="id" th:value="${student.id}">

    <label>Name:</label><br>
    <input type="text" name="name" th:value="${student.name}"><br><br>

    <label>USN:</label><br>
    <input type="text" name="usn" th:value="${student.usn}"><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" th:value="${student.email}"><br><br>

    <label>Phone:</label><br>
    <input type="text" name="phone" th:value="${student.phone}"><br><br>

    <label>Department:</label><br>
    <input type="text" name="department" th:value="${student.department}"><br><br>

    <label>CGPA:</label><br>
    <input type="number" step="0.01" name="cgpa" th:value="${student.cgpa}"><br><br>

    <label>Password:</label><br>
    <input type="password" name="password" th:value="${student.password}"><br><br>

    <button type="submit">Update Student</button>

</form>

</body>
</html>
