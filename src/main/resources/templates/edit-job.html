<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Edit Job</h2>

        <form action="/updateJob" method="post">

            <input type="hidden" name="id" th:value="${job.id}">

            <div class="mb-3">
                <label>Job Title</label>
                <input type="text" name="jobTitle" class="form-control"
                       th:value="${job.jobTitle}" required>
            </div>

            <div class="mb-3">
                <label>Company Name</label>
                <input type="text" name="companyName" class="form-control"
                       th:value="${job.companyName}" required>
            </div>

            <div class="mb-3">
                <label>Location</label>
                <input type="text" name="location" class="form-control"
                       th:value="${job.location}" required>
            </div>

            <div class="mb-3">
                <label>Salary</label>
                <input type="text" name="salary" class="form-control"
                       th:value="${job.salary}" required>
            </div>

            <div class="mb-3">
                <label>Description</label>
                <textarea name="description"
                          class="form-control"
                          rows="4"
                          required
                          th:text="${job.description}"></textarea>
            </div>

            <button class="btn btn-primary">
                Update Job
            </button>

        </form>

    </div>

</div>

</body>
</html>
