<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recruiter Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Recruiter Registration</h2>

        <form action="/saveRecruiter" method="post">

            <div class="mb-3">
                <label class="form-label">Company Name</label>
                <input type="text" name="companyName" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Recruiter Name</label>
                <input type="text" name="recruiterName" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success">
                    Register Recruiter
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
